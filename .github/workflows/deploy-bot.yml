name: Deploy Bot

on:
  push:
    branches: [bot, main]

jobs:
  docker:
    name: Build & push bot image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/bot/Dockerfile
          push: true
          tags: |
            ghcr.io/pollitomayo/nul-bot:latest
            ghcr.io/pollitomayo/nul-bot:${{ github.sha }}
          cache-from: type=gha,scope=bot
          cache-to: type=gha,scope=bot,mode=max

  portainer:
    name: Redeploy Portainer stack
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Trigger webhook
        run: curl -s -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"
