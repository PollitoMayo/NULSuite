name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Docker: build + push server and bot images ───────────────
  docker:
    name: Docker (${{ matrix.package }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        package: [server, bot]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/${{ matrix.package }}/Dockerfile
          push: true
          tags: |
            ghcr.io/pollitomayo/nul-${{ matrix.package }}:latest
            ghcr.io/pollitomayo/nul-${{ matrix.package }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.package }}
          cache-to: type=gha,scope=${{ matrix.package }},mode=max

  # ── Portainer: trigger stack redeploy after images are pushed ─
  portainer:
    name: Redeploy Portainer stack
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Trigger webhook
        run: curl -s -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"

  # ── Desktop: build Electron app and publish GitHub Release ────
  desktop:
    name: Desktop release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm --filter @nul/shared build

      - name: Set version
        shell: bash
        run: |
          VERSION=$(node -p "require('./packages/desktop/package.json').version")
          cd packages/desktop && npm version "$VERSION" --no-git-tag-version

      - name: Package and publish
        run: pnpm --filter @nul/desktop exec electron-vite build && pnpm --filter @nul/desktop exec electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SERVER_URL: ${{ secrets.SERVER_URL }}