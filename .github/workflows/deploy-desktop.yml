name: Deploy Desktop

on:
  push:
    branches: [desktop]

jobs:
  desktop:
    name: Desktop release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm --filter @nul/shared build

      - name: Set version
        shell: bash
        run: |
          VERSION=$(node -p "require('./packages/desktop/package.json').version")
          cd packages/desktop && npm version "$VERSION" --no-git-tag-version

      - name: Package and publish
        run: pnpm --filter @nul/desktop exec electron-vite build && pnpm --filter @nul/desktop exec electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SERVER_URL: ${{ secrets.SERVER_URL }}